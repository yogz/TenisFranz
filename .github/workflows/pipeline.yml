name: pipeline

on:
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC
  workflow_dispatch:
    inputs:
      years:
        description: "Year range e.g. 2018-2025"
        required: false
        default: "2005-2025"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.11
      - name: Install deps
        working-directory: pipeline
        run: uv sync
      - name: Run pipeline
        working-directory: pipeline
        run: uv run python -m tenisfranz.run_all --years ${{ github.event.inputs.years || '2005-2025' }}
      - name: Commit JSON artifacts
        run: |
          git config user.name "tenisfranz-bot"
          git config user.email "bot@tenisfranz.local"
          git add web/public/data/*.json
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            git commit -m "pipeline: refresh data $(date -u +%Y-%m-%d)"
            git push
          fi
