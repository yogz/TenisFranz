name: historical_roi

# Walk-forward simulation against tennis-data.co.uk archives. Refreshes
# `web/public/data/vs_market.json`. The job takes ~3 min (download cache
# warms up the bookie xlsx files, then 20 years × 6 per-(tour, surface)
# retrains).
#
# Schedule: once a week on Monday at 05:37 UTC. The ROI curve barely
# moves day-to-day (new data is <0.05% of history), so a weekly refresh
# is plenty. Off-the-hour minute (:37) avoids the GitHub-wide rate-limit
# spike that hits every :00.
#
# Also stays dispatchable manually for the Actions tab / gh CLI.
on:
  schedule:
    - cron: "37 5 * * 1"  # Monday 05:37 UTC
  workflow_dispatch:
    inputs:
      years:
        description: "Test-year range (default: 2005..last calendar year)"
        required: false
        default: "2005-2024"
      edge:
        description: "Edge threshold, e.g. 0.03 = 3pts"
        required: false
        default: "0.03"

permissions:
  contents: write

concurrency:
  group: commit-main # shared with pipeline.yml to prevent git-push races
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.11
      - name: Install deps
        working-directory: pipeline
        run: uv sync
      - name: Run historical ROI simulation
        working-directory: pipeline
        env:
          # On schedule events `github.event.inputs.*` is empty, so fall
          # back to the same defaults declared under workflow_dispatch.
          YEARS: ${{ github.event.inputs.years || '2005-2024' }}
          EDGE: ${{ github.event.inputs.edge || '0.03' }}
        run: |
          uv run python -m tenisfranz.historical_roi \
            --years "$YEARS" \
            --edge "$EDGE"
      - name: Commit vs_market.json if changed
        run: |
          git config user.name "tenisfranz-bot"
          git config user.email "bot@tenisfranz.local"
          FILE=web/public/data/vs_market.json
          if [ ! -f "$FILE" ]; then
            echo "no output file produced — aborting"
            exit 1
          fi
          # -f because web/public/data/*.json is gitignored by default; we
          # deliberately commit this one derived artefact so Vercel can read it.
          git add -f "$FILE"
          if git diff --staged --quiet; then
            echo "no change to commit"
            exit 0
          fi
          git commit -m "historical_roi: refresh vs_market.json $(date -u +%Y-%m-%d)"
          git push
