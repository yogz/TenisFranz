cription\":\"Une liste de courses partagée et organisée par personne. Cochez vos articles au fur et à mesure, même sans connexion.\",\"ctaTitle\":\"Prêt à simplifier vos fêtes ?\",\"ctaDescription\":\"Rejoignez des milliers de familles qui utilisent déjà CoList.\",\"footerText\":\"Fait avec ✨ pour vos plus beaux moments.\",\"footerLinks\":{\"instagram\":\"Instagram\",\"contact\":\"Contact\",\"behindTheScenes\":\"En coulisses\"},\"ctaFooterButton\":\"Commencer maintenant\"},\"LandingAlt\":{\"badge\":\"L'organisation de repas partagés, simplifiée.\",\"heroTitle\":\"Organisateur de repas\",\"heroTitleHighlight\":\"partagés\",\"heroDescription\":\"Chacun choisit ce qu'il apporte. Plus de doublons. Plus de messages perdus. Juste un repas réussi entre amis.\",\"ctaStart\":\"Créer mon événement\",\"ctaDemo\":\"Voir comment ça marche\",\"feature1Title\":\"L'Assistant Culinaire (IA) BETA\",\"feature1Description\":\"Dites juste 'Lasagnes pour 12', CoList génère instantanément la liste de tous les ingrédients avec les quantités exactes. Plus besoin de chercher la recette ou de faire des calculs savants.\",\"feature1Tag\":\"Nouveau\",\"feature2Title\":\"Liste de Courses Magique\",\"feature2Description\":\"L'application additionne tout pour vous et crée la liste des courses pour chaque invité. La liste est triée et prête à être cochée en magasin.\",\"feature3Title\":\"Zéro Friction (Aucun compte)\",\"feature3Description\":\"Oubliez les installations. Vos proches reçoivent un lien et participent d'un clic : 'J'apporte le champagne', 'C'est moi !'. C'est validé instantanément, sans aucune inscription.\",\"feature4Title\":\"Design Immersif\",\"feature4Description\":\"Parce qu'on mange aussi avec les yeux, votre invitation est conçue pour être aussi belle que votre futur repas. Pas besoin de passer des heures sur la mise en page.\",\"socialProofTitle\":\"Ils organisent leurs événements avec CoList\",\"socialProofQuote\":\"\\\"Enfin une app qui ne ressemble pas à un tableau Excel.\\\
